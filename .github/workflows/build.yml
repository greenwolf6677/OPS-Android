name: OPS Final Success Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-22.04  # نستخدم نسخة أقدم وأكثر استقراراً
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt-get clean
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.33
          sudo apt-get install -y libsqlite3-dev
      - name: Build with Buildozer
        run: |
          # الموافقة على التراخيص مسبقاً
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          buildozer android debug || true
          # المحاولة الثانية بعد تثبيت الأدوات
          buildozer android debug