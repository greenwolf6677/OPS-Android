name: OPS Absolute Final Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-setuptools
          pip install --upgrade pip buildozer cython==0.29.33

      - name: Android SDK/NDK Pre-warm
        run: |
          # هذه الخطوة لتجهيز الأدوات فقط دون بناء التطبيق
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | buildozer android p4a -- get-ndk || true
          yes | buildozer android p4a -- get-sdk || true

      - name: Build APK (Silent Mode)
        run: |
          # تشغيل البناء مباشرة مع تعطيل التفاعل لمنع Broken Pipe
          buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OPS-App-Package
          path: bin/*.apk