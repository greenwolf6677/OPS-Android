name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip autoconf libtool
          pip install buildozer cython pillow
      
      - name: Create icon
        run: |
          mkdir -p assets/icon
          python3 -c "from PIL import Image; Image.new('RGB', (512, 512), color='#2ecc71').save('assets/icon/logo.png')"
      
      - name: Build APK
        run: buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OPS-APK
          path: bin/*.apk